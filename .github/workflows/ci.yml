name: Backend CI

on:
  push:
    branches:
      - main
      - staging
      - 'codex/**'
  pull_request:
    branches:
      - main
      - staging

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static Analysis (Type Checking)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run Unit Tests
        run: npm test

