name: Backend CI

on:
  push:
    branches:
      - main
      - staging
      - 'codex/**'
  pull_request:
    branches:
      - main
      - staging

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Static Analysis (Type Checking)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: sonarsource/sonarsource-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Deploy to Hugging Face (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://spartan173:${HF_TOKEN}@huggingface.co/spaces/spartan173/contex
          git push hf HEAD:main --force

      - name: Deploy to Hugging Face (Staging)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/heads/codex/'))
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf-staging https://spartan173:${HF_TOKEN}@huggingface.co/spaces/spartan173/contex-staging
          git push hf-staging HEAD:main --force


