name: Deploy backend to Hugging Face

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git identity
        run: |
          git config user.email "ci@contex360.com"
          git config user.name "Contex360 CI"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Saltar si las secrets no están configuradas
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "Hugging Face secrets not configured. Skipping deployment."
            exit 0
          fi

          # Agregar remote apuntando al Space de Hugging Face con autenticación
          git remote add hf https://${{ env.HF_USERNAME }}:${{ env.HF_TOKEN }}@huggingface.co/spaces/${{ env.HF_USERNAME }}/${{ env.HF_SPACE_NAME }}

          # Forzar push de la rama staging al main del Space (HF dispara el build Docker)
          git push hf HEAD:main --force
